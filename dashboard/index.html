<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg-0: #07090d;
      --bg-1: #0d1117;
      --bg-2: #141a23;
      --line: #1f2937;
      --text-0: #e6edf3;
      --text-1: #8b98a9;
      --text-2: #4b5563;
      --profit: #2eff8a;
      --loss: #ff4d5e;
      --data: #38d9f5;
      --warn: #ffb224;
      --gold: #ffd75e;
    }
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-0);
      color: var(--text-0);
      min-width: 1920px;
      overflow-x: auto;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .panel {
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 4px;
    }
    .panel-header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-body { padding: 12px; }
    .grid-12 {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
      padding: 12px;
    }
    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    .col-5 { grid-column: span 5; }
    .col-6 { grid-column: span 6; }
    .col-7 { grid-column: span 7; }
    .col-8 { grid-column: span 8; }
    .col-12 { grid-column: span 12; }
    .text-profit { color: var(--profit); }
    .text-loss { color: var(--loss); }
    .text-data { color: var(--data); }
    .text-warn { color: var(--warn); }
    .text-gold { color: var(--gold); }
    .text-muted { color: var(--text-1); }
    .text-dim { color: var(--text-2); }
    .btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 3px;
      background: var(--bg-2);
      color: var(--text-0);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn:hover { border-color: var(--text-2); background: var(--line); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { border-color: var(--data); color: var(--data); }
    .btn-danger { border-color: var(--loss); color: var(--loss); }
    .btn-warn { border-color: var(--warn); color: var(--warn); }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }
    .badge-live { background: rgba(255,77,94,0.15); color: var(--loss); border: 1px solid var(--loss); }
    .badge-dry { background: rgba(56,217,245,0.1); color: var(--data); border: 1px solid var(--data); }
    .badge-ok { background: rgba(46,255,138,0.1); color: var(--profit); }
    .badge-warn { background: rgba(255,178,36,0.1); color: var(--warn); }
    .badge-error { background: rgba(255,77,94,0.1); color: var(--loss); }
    table.data { width: 100%; border-collapse: collapse; font-size: 12px; }
    table.data th {
      text-align: left;
      padding: 6px 8px;
      color: var(--text-2);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      font-family: 'JetBrains Mono', monospace;
    }
    table.data td {
      padding: 6px 8px;
      border-bottom: 1px solid rgba(31,41,55,0.5);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    table.data tr:hover td { background: rgba(20,26,35,0.6); }
    .flash-up { animation: flashUp 0.6s ease; }
    .flash-down { animation: flashDown 0.6s ease; }
    @keyframes flashUp {
      0% { background: rgba(46,255,138,0.25); }
      100% { background: transparent; }
    }
    @keyframes flashDown {
      0% { background: rgba(255,77,94,0.25); }
      100% { background: transparent; }
    }
    @media (prefers-reduced-motion: reduce) {
      .flash-up, .flash-down { animation: none; }
      * { transition: none !important; }
    }
    .conn-banner {
      padding: 6px 16px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
    }
    .conn-degraded { background: rgba(255,178,36,0.15); color: var(--warn); border-bottom: 1px solid var(--warn); }
    .conn-down { background: rgba(255,77,94,0.15); color: var(--loss); border-bottom: 1px solid var(--loss); }
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40;
    }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: 480px;
      background: var(--bg-1); border-left: 1px solid var(--line);
      z-index: 50; display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.2s ease;
    }
    .drawer.open { transform: translateX(0); }
    @media (prefers-reduced-motion: reduce) { .drawer { transition: none; } }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 60;
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--bg-1); border: 1px solid var(--line);
      border-radius: 6px; max-width: 640px; width: 90%; max-height: 80vh;
      overflow: auto;
    }
    .log-line { padding: 2px 0; font-size: 11px; line-height: 1.5; }
    .log-BET { color: var(--gold); }
    .log-WIN { color: var(--profit); }
    .log-LOSS { color: var(--loss); }
    .log-SKIP { color: var(--text-2); }
    .log-CANDIDATE { color: var(--data); }
    .log-ERROR { color: var(--loss); }
    .log-INFO { color: var(--text-1); }
    .metar-card {
      background: var(--bg-2); border: 1px solid var(--line);
      border-radius: 4px; padding: 10px;
    }
    .metar-card.alert-red { border-color: var(--loss); }
    .metar-card.alert-yellow { border-color: var(--warn); }
    .scrollbar::-webkit-scrollbar { width: 6px; }
    .scrollbar::-webkit-scrollbar-track { background: var(--bg-0); }
    .scrollbar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
    .atlas-msg { margin-bottom: 12px; }
    .atlas-msg-user { text-align: right; }
    .atlas-bubble {
      display: inline-block; padding: 8px 12px; border-radius: 4px;
      font-size: 13px; line-height: 1.5; max-width: 90%;
    }
    .atlas-bubble-user { background: var(--bg-2); border: 1px solid var(--line); }
    .atlas-bubble-assistant { background: rgba(56,217,245,0.08); border: 1px solid rgba(56,217,245,0.2); }
    .action-card {
      background: rgba(255,178,36,0.08); border: 1px solid var(--warn);
      border-radius: 4px; padding: 12px; margin: 8px 0;
    }
    .progress-bar {
      height: 4px; background: var(--bg-0); border-radius: 2px; overflow: hidden;
    }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .killswitch-overlay {
      position: fixed; inset: 0; background: rgba(255,77,94,0.08);
      z-index: 70; display: flex; align-items: center; justify-content: center;
    }
    .shortcut-key {
      display: inline-block; padding: 2px 6px; background: var(--bg-2);
      border: 1px solid var(--line); border-radius: 3px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; min-width: 24px; text-align: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useReducer, useContext, useEffect, useRef, useCallback, useMemo, createContext, useState } = React;

    const API = location.origin.startsWith("http") ? location.origin : "http://localhost:5000";

    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        headers: { "Content-Type": "application/json", ...(opts.headers || {}) },
        ...opts,
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || `API error ${res.status}`);
      return json.data;
    }

    /* ── Store ── */
    const initialState = {
      status: null,
      positions: [],
      balance: null,
      metar: [],
      logs: [],
      candidates: [],
      calibration: null,
      trades: null,
      config: null,
      connection: "ok",
      failCount: 0,
      pollingPaused: false,
      hidden: false,
      ui: {
        atlasOpen: false,
        settingsOpen: false,
        cheatsheetOpen: false,
        killswitchConfirm: false,
        logFilter: "",
      },
      atlasMessages: [],
      atlasPending: null,
      atlasStreaming: false,
      lastUpdated: {},
    };

    function reducer(state, action) {
      switch (action.type) {
        case "SET": return { ...state, ...action.payload };
        case "SET_UI": return { ...state, ui: { ...state.ui, ...action.payload } };
        case "FETCH_OK":
          return {
            ...state,
            ...action.payload,
            connection: "ok",
            failCount: 0,
            lastUpdated: { ...state.lastUpdated, ...action.updated },
          };
        case "FETCH_FAIL": {
          const fc = state.failCount + 1;
          return {
            ...state,
            failCount: fc,
            connection: fc >= 3 ? "down" : "degraded",
          };
        }
        case "ATLAS_MSG":
          return { ...state, atlasMessages: [...state.atlasMessages, action.msg] };
        case "ATLAS_UPDATE_LAST":
          return {
            ...state,
            atlasMessages: state.atlasMessages.map((m, i) =>
              i === state.atlasMessages.length - 1 ? { ...m, content: m.content + action.delta } : m
            ),
          };
        case "ATLAS_PENDING": return { ...state, atlasPending: action.pending };
        case "ATLAS_STREAMING": return { ...state, atlasStreaming: action.streaming };
        case "ATLAS_DONE_STREAMING":
          return {
            ...state,
            atlasStreaming: false,
            atlasMessages: state.atlasMessages.map((m, i) =>
              i === state.atlasMessages.length - 1 ? { ...m, streaming: false } : m
            ),
          };
        case "CLEAR_ATLAS": return { ...state, atlasMessages: [], atlasPending: null };
        default: return state;
      }
    }

    const AtlasContext = createContext(null);
    function useAtlasStore() {
      const ctx = useContext(AtlasContext);
      if (!ctx) throw new Error("useAtlasStore outside provider");
      return ctx;
    }

    /* ── FlashValue ── */
    function FlashValue({ value, format, className = "" }) {
      const prev = useRef(value);
      const [flash, setFlash] = useState("");
      useEffect(() => {
        if (prev.current !== value && value != null && prev.current != null) {
          const n = parseFloat(value), p = parseFloat(prev.current);
          if (!isNaN(n) && !isNaN(p)) {
            setFlash(n > p ? "flash-up" : n < p ? "flash-down" : "");
            const t = setTimeout(() => setFlash(""), 600);
            prev.current = value;
            return () => clearTimeout(t);
          }
        }
        prev.current = value;
      }, [value]);
      const display = format ? format(value) : value;
      return <span className={`${className} ${flash} inline-block rounded px-0.5`}>{display ?? "—"}</span>;
    }

    /* ── Helpers ── */
    const fmtUsd = (v) => v == null ? "—" : `$${Number(v).toFixed(2)}`;
    const fmtPct = (v) => v == null ? "—" : `${(Number(v) * 100).toFixed(1)}%`;
    const fmtPnl = (v) => {
      if (v == null) return "—";
      const n = Number(v);
      return `${n >= 0 ? "+" : ""}$${n.toFixed(2)}`;
    };
    const pnlClass = (v) => v == null ? "" : Number(v) >= 0 ? "text-profit" : "text-loss";

    /* ── Poller ── */
    function usePoller(dispatch, state) {
      const timers = useRef({});
      const paused = state.pollingPaused || state.hidden;

      const poll = useCallback(async (key, path, updatedKey) => {
        try {
          const data = await api(path);
          const payload = { [key]: data };
          dispatch({ type: "FETCH_OK", payload, updated: { [updatedKey || key]: Date.now() } });
        } catch (e) {
          dispatch({ type: "FETCH_FAIL" });
        }
      }, [dispatch]);

      useEffect(() => {
        const onVis = () => dispatch({ type: "SET", payload: { hidden: document.hidden } });
        document.addEventListener("visibilitychange", onVis);
        onVis();
        return () => document.removeEventListener("visibilitychange", onVis);
      }, [dispatch]);

      useEffect(() => {
        Object.values(timers.current).forEach(clearInterval);
        timers.current = {};
        if (paused) return;

        const schedule = (key, path, ms, updatedKey) => {
          poll(key, path, updatedKey);
          timers.current[key] = setInterval(() => poll(key, path, updatedKey), ms);
        };

        schedule("status", "/api/status", 15000);
        schedule("positions", "/api/positions", 30000);
        schedule("balance", "/api/balance", 30000, "balance");
        schedule("metar", "/api/metar", 300000);
        schedule("logs", "/api/logs?lines=150", 60000);
        schedule("candidates", "/api/candidates", 60000);
        schedule("calibration", "/api/calibration", 300000);
        schedule("trades", "/api/trades?limit=200", 300000);

        return () => Object.values(timers.current).forEach(clearInterval);
      }, [paused, poll]);
    }

    /* ── Keyboard shortcuts ── */
    function useKeyboardShortcuts() {
      const { state, dispatch, control } = useAtlasStore();
      const killInput = useRef("");

      useEffect(() => {
        const handler = (e) => {
          if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;

          if (state.ui.killswitchConfirm) {
            if (e.key.length === 1) killInput.current += e.key.toUpperCase();
            if (killInput.current.endsWith("KILL")) {
              control("whetherbot", "killswitch");
              dispatch({ type: "SET_UI", payload: { killswitchConfirm: false } });
              killInput.current = "";
            }
            if (e.key === "Escape") {
              dispatch({ type: "SET_UI", payload: { killswitchConfirm: false } });
              killInput.current = "";
            }
            return;
          }

          switch (e.key.toLowerCase()) {
            case "s": e.preventDefault(); control("whetherbot", "scan"); break;
            case "k":
              e.preventDefault();
              killInput.current = "";
              if (state.status?.mode === "LIVE") {
                dispatch({ type: "SET_UI", payload: { killswitchConfirm: true } });
              } else {
                control("whetherbot", "killswitch");
              }
              break;
            case "p": e.preventDefault(); control("whetherbot", state.status?.killswitch ? "resume" : "pause"); break;
            case "a": e.preventDefault(); dispatch({ type: "SET_UI", payload: { atlasOpen: !state.ui.atlasOpen } }); break;
            case "?": e.preventDefault(); dispatch({ type: "SET_UI", payload: { cheatsheetOpen: !state.ui.cheatsheetOpen } }); break;
          }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [state, dispatch, control]);
    }

    /* ── Connection Banner ── */
    function ConnectionBanner() {
      const { state } = useAtlasStore();
      if (state.connection === "ok") return null;
      const cls = state.connection === "down" ? "conn-down" : "conn-degraded";
      const msg = state.connection === "down"
        ? "CONNECTION DOWN — API unreachable. Retrying…"
        : "CONNECTION DEGRADED — last fetch failed";
      return <div className={`conn-banner ${cls}`}>{msg}</div>;
    }

    /* ── MissionControl ── */
    function MissionControl() {
      const { state, dispatch, control } = useAtlasStore();
      const s = state.status || {};
      const isLive = s.mode === "LIVE";

      return (
        <header className="panel" style={{ borderRadius: 0, borderLeft: 0, borderRight: 0, borderTop: 0 }}>
          <div className="flex items-center justify-between px-4 py-3">
            <div className="flex items-center gap-4">
              <h1 className="mono text-lg font-semibold tracking-wider">
                <span className="text-data">ATLAS</span> COMMAND CENTER
              </h1>
              <span className={`badge ${isLive ? "badge-live" : "badge-dry"}`}>{s.mode || "…"}</span>
              {s.killswitch && <span className="badge badge-error">KILLSWITCH</span>}
              {state.pollingPaused && <span className="badge badge-warn">POLLING PAUSED</span>}
            </div>
            <div className="flex items-center gap-6 mono text-sm">
              <div>
                <span className="text-dim text-xs mr-2">PORTFOLIO</span>
                <FlashValue value={s.portfolio_value} format={fmtUsd} className="text-gold font-semibold" />
              </div>
              <div>
                <span className="text-dim text-xs mr-2">DAY P&L</span>
                <FlashValue value={s.daily_pnl} format={fmtPnl} className={`font-semibold ${pnlClass(s.daily_pnl)}`} />
              </div>
              <div>
                <span className="text-dim text-xs mr-2">POSITIONS</span>
                <span>{s.open_positions ?? "—"}/{s.max_positions ?? "—"}</span>
              </div>
              <div>
                <span className="text-dim text-xs mr-2">DRAWDOWN</span>
                <span className={s.drawdown_pct > 10 ? "text-warn" : ""}>{s.drawdown_pct ?? 0}%</span>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <button className="btn btn-primary" onClick={() => control("whetherbot", "scan")} title="Scan (S)">SCAN</button>
              <button className="btn" onClick={() => control("whetherbot", s.killswitch ? "resume" : "pause")} title="Pause (P)">
                {s.killswitch ? "RESUME" : "PAUSE"}
              </button>
              <button className="btn btn-danger" onClick={() => {
                if (isLive) dispatch({ type: "SET_UI", payload: { killswitchConfirm: true } });
                else control("whetherbot", "killswitch");
              }} title="Killswitch (K)">KILL</button>
              <button className="btn" onClick={() => dispatch({ type: "SET_UI", payload: { atlasOpen: true } })} title="ATLAS (A)">ATLAS</button>
              <button className="btn" onClick={() => dispatch({ type: "SET_UI", payload: { settingsOpen: true } })}>⚙</button>
              <button className="btn" onClick={() => dispatch({ type: "SET", payload: { pollingPaused: !state.pollingPaused } })}>
                {state.pollingPaused ? "▶ POLL" : "⏸ POLL"}
              </button>
            </div>
          </div>
        </header>
      );
    }

    /* ── BotCards ── */
    function BotCards() {
      const { state, control } = useAtlasStore();
      const agents = state.status?.agents || [];

      if (!agents.length) {
        return (
          <div className="panel col-12">
            <div className="panel-header">Agents</div>
            <div className="panel-body text-dim text-sm">No agents registered — bot may be offline</div>
          </div>
        );
      }

      return (
        <div className="col-12 flex gap-3">
          {agents.map((a) => {
            const st = (a.status || "unknown").toLowerCase();
            const badge = st === "running" ? "badge-ok" : st === "paused" ? "badge-warn" : st === "error" ? "badge-error" : "badge-warn";
            return (
              <div key={a.id} className="panel flex-1">
                <div className="panel-header">
                  <span>{a.id}</span>
                  <span className={`badge ${badge}`}>{a.status || "?"}</span>
                </div>
                <div className="panel-body">
                  <div className="mono text-xs text-muted space-y-1">
                    <div>PID: {a.pid || "—"}</div>
                    <div>Heartbeat: {a.last_heartbeat ? new Date(a.last_heartbeat).toLocaleTimeString() : "—"}</div>
                    {a.last_scan && (
                      <div>Last scan: {a.last_scan.markets_checked ?? 0} mkts, {a.last_scan.candidates ?? 0} cands</div>
                    )}
                    {a.stale && <div className="text-loss">STALE</div>}
                  </div>
                  <div className="flex gap-2 mt-3">
                    {st !== "running" && <button className="btn btn-primary text-xs" onClick={() => control(a.id, "start")}>START</button>}
                    {st === "running" && <button className="btn text-xs" onClick={() => control(a.id, "pause")}>PAUSE</button>}
                    {st === "paused" && <button className="btn btn-primary text-xs" onClick={() => control(a.id, "resume")}>RESUME</button>}
                    <button className="btn text-xs" onClick={() => control(a.id, "scan")}>SCAN</button>
                    <button className="btn btn-danger text-xs" onClick={() => control(a.id, "stop")}>STOP</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    /* ── PositionTracker ── */
    function PositionTracker() {
      const { state, sellPosition } = useAtlasStore();
      const positions = state.positions || [];

      return (
        <div className="panel col-7">
          <div className="panel-header">
            <span>Open Positions ({positions.length})</span>
          </div>
          <div className="panel-body overflow-auto" style={{ maxHeight: 340 }}>
            {positions.length === 0 ? (
              <div className="text-dim text-sm">No open positions</div>
            ) : (
              <table className="data">
                <thead>
                  <tr>
                    <th>Ticker</th><th>Side</th><th>Qty</th><th>Avg</th><th>Mkt</th>
                    <th>Cost</th><th>Unreal</th><th>Settle%</th><th>ETA</th><th></th>
                  </tr>
                </thead>
                <tbody>
                  {positions.map((p) => (
                    <tr key={p.id}>
                      <td title={p.title}>{p.ticker?.slice(0, 20)}</td>
                      <td className={p.side === "YES" ? "text-profit" : "text-loss"}>{p.side}</td>
                      <td>{p.contracts}</td>
                      <td>{p.avg_price?.toFixed(2)}</td>
                      <td>{p.market_price?.toFixed(2)}</td>
                      <td>{fmtUsd(p.cost)}</td>
                      <td className={pnlClass(p.unrealized_pnl)}>{fmtPnl(p.unrealized_pnl)}</td>
                      <td className="text-data">{p.settle_prob != null ? `${(p.settle_prob * 100).toFixed(0)}%` : "—"}</td>

      const winRef = useRef(null);

      useEffect(() => {

        const token = {
          data: "rgba(56,217,245,0.8)",
          profit: "rgba(46,255,138,0.8)",
          loss: "rgba(255,77,94,0.8)",
          gold: "rgba(255,215,94,0.8)",
          grid: "rgba(31,41,55,0.5)",
          text: "#8b98a9",
        };

        const opts = {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: token.text, font: { family: "JetBrains Mono", size: 10 } } } },
          scales: {
            x: { ticks: { color: token.text, font: { size: 9 } }, grid: { color: token.grid } },
            y: { ticks: { color: token.text, font: { size: 9 } }, grid: { color: token.grid } },

              labels: cal.calibration_curve.map((b) => b.bucket),

                { label: "Predicted", data: cal.calibration_curve.map((b) => b.predicted), backgroundColor: token.data },
                { label: "Actual", data: cal.calibration_curve.map((b) => b.actual), backgroundColor: token.gold },
              ],
            },
            options: { ...opts, plugins: { ...opts.plugins, title: { display: true, text: "Calibration Curve", color: token.text } } },
          });
        }

        if (clvRef.current && cal.clv_series?.length) {
          charts.current.clv?.destroy();
          charts.current.clv = new Chart(clvRef.current, {
            type: "line",
            data: {
              labels: cal.clv_series.map((c) => c.date || c.trade_id),
              datasets: [{
                label: "CLV", data: cal.clv_series.map((c) => c.clv),

    /* ── Provider ── */
    function AtlasProvider({ children }) {
      const [state, dispatch] = useReducer(reducer, initialState);

      const control = useCallback(async (bot, action) => {
        try {
          await api("/api/control", { method: "POST", body: JSON.stringify({ bot, action }) });
        } catch (e) { console.error("control:", e.message); }
      }, []);

      const sellPosition = useCallback(async (positionId) => {
        try {
          const result = await api("/api/sell", { method: "POST", body: JSON.stringify({ position_id: positionId }) });
          if (result.sold) alert(`Sold @ ${result.fill_price}, P&L: ${fmtPnl(result.pnl)}`);
          else alert(result.reason || "Sell failed");
        } catch (e) { alert(e.message); }
      }, []);

      const loadConfig = useCallback(async () => {
        try {
          const data = await api("/api/config");
          dispatch({ type: "SET", payload: { config: data } });
        } catch (e) { console.error(e); }
      }, []);

      const saveConfig = useCallback(async (key, value) => {
        await api("/api/config", { method: "POST", body: JSON.stringify({ key, value }) });
        await loadConfig();
      }, [loadConfig]);

      const atlasChat = useCallback(async (text) => {
        const userMsg = { role: "user", content: text };
        const messages = [...state.atlasMessages.filter((m) => m.role).map((m) => ({ role: m.role, content: m.content })), { role: "user", content: text }];
        dispatch({ type: "ATLAS_MSG", msg: userMsg });
        dispatch({ type: "ATLAS_STREAMING", streaming: true });
        const assistantMsg = { role: "assistant", content: "", streaming: true };
        dispatch({ type: "ATLAS_MSG", msg: assistantMsg });

        try {
          const res = await fetch(API + "/api/atlas/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages }),
          });

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              try {
                const evt = JSON.parse(line.slice(6));
                if (evt.type === "text") {
                  dispatch({ type: "ATLAS_UPDATE_LAST", delta: evt.delta });
                } else if (evt.type === "action_request") {
                  dispatch({ type: "ATLAS_PENDING", pending: evt });
                } else if (evt.type === "action") {
                  dispatch({ type: "ATLAS_MSG", msg: { role: "system", content: `[${evt.label || ""}${evt.name}] ${JSON.stringify(evt.result)}`, action: evt } });
                } else if (evt.type === "error") {
                  dispatch({ type: "ATLAS_UPDATE_LAST", delta: `\n⚠ ${evt.message}` });
                } else if (evt.type === "done") {
                  dispatch({ type: "ATLAS_DONE_STREAMING" });
                }
              } catch (_) {}
            }
          }
        } catch (e) {
          dispatch({ type: "ATLAS_UPDATE_LAST", delta: `\n⚠ ${e.message}` });
        }
        dispatch({ type: "ATLAS_DONE_STREAMING" });
      }, [state.atlasMessages]);

      const atlasConfirm = useCallback(async (requestId) => {
        try {
          const result = await api("/api/atlas/confirm", { method: "POST", body: JSON.stringify({ request_id: requestId }) });
          dispatch({ type: "ATLAS_PENDING", pending: null });
          dispatch({ type: "ATLAS_MSG", msg: { role: "system", content: `✓ Executed ${result.name}: ${JSON.stringify(result.result)}` } });
        } catch (e) {
          dispatch({ type: "ATLAS_MSG", msg: { role: "system", content: `✗ Confirm failed: ${e.message}` } });
        }
      }, []);

      const ctx = { state, dispatch, control, sellPosition, loadConfig, saveConfig, atlasChat, atlasConfirm };
      usePoller(dispatch, state);

      return <AtlasContext.Provider value={ctx}>{children}</AtlasContext.Provider>;
    }

    /* ── App ── */
    function AppInner() {
      useKeyboardShortcuts();
      return (
        <div className="flex flex-col h-full">
          <MissionControl />
          <ConnectionBanner />
          <div className="flex-1 overflow-auto">
            <div className="grid-12">
              <BotCards />
              <PositionTracker />
              <BudgetRisk />
              <MetarGrid />
              <Candidates />
              <CalibrationPanel />
              <TradeHistory />
              <ScanFeed />
            </div>
          </div>
          <AtlasDrawer />
          <SettingsModal />
          <CheatSheet />
          <KillswitchConfirm />
        </div>
      );
    }

    function App() {
      return (
        <AtlasProvider>
          <AppInner />
        </AtlasProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
